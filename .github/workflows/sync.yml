name: Sync Bookmarks

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6am UTC
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install trafilatura anthropic

      - name: Write .env from secrets
        run: |
          cat > .env << 'EOF'
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_CLIENT_ID=${{ secrets.TWITTER_CLIENT_ID }}
          TWITTER_CLIENT_SECRET=${{ secrets.TWITTER_CLIENT_SECRET }}
          TWITTER_OAUTH2_ACCESS_TOKEN=${{ secrets.TWITTER_OAUTH2_ACCESS_TOKEN }}
          TWITTER_OAUTH2_REFRESH_TOKEN=${{ secrets.TWITTER_OAUTH2_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          VAULT_PATH=./vault
          EOF

      - name: Fetch bookmarks
        env:
          VAULT_PATH: ./vault
        run: python3 fetch_bookmarks.py

      - name: Ingest into wiki
        env:
          VAULT_PATH: ./vault
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 ingest.py

      - name: Synthesize weekly patterns
        env:
          VAULT_PATH: ./vault
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 synthesize.py --days 7

      - name: Commit and push new wiki pages
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add vault/
          git add .seen_bookmarks.json || true
          if git diff --cached --quiet; then
            echo "No new pages to commit."
          else
            git commit -m "sync: $(date -u '+%Y-%m-%d') bookmarks"
            git push
          fi
